spring.application.name=orders
server.port=8081

jwt.secret=CHANGE_ME_WITH_YOUR_SECRET
jwt.expiration=3600000

spring.datasource.url=jdbc:postgresql://localhost:5432/ordersdb
spring.datasource.username=YOUR_DB_USERNAME
spring.datasource.password=YOUR_DB_PASSWORD
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.flyway.enabled=true

spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

storage.s3.endpoint=http://localhost:9000
storage.s3.region=us-east-1
storage.s3.access-key=YOUR_MINIO_ACCESS_KEY
storage.s3.secret-key=YOUR_MINIO_SECRET_KEY
storage.s3.bucket=invoices

notification.url=https://dummyjson.com/c/3029-d29f-4014-9fb4